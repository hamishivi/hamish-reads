name: Daily AI Research Digest

on:
  schedule:
    # 8:30pm ET (00:30 UTC) — right after arxiv's 8pm ET posting
    # Runs Sun-Thu (arxiv posts new papers those days)
    - cron: '30 0 * * 1,2,3,4,5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD), leave empty for today'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            uv run python -m src.main --date "${{ github.event.inputs.date }}"
          else
            uv run python -m src.main
          fi

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "Update digest for $(date -u +%Y-%m-%d)"
          git push
